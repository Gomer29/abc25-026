<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GLY Motor Group</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1><div class="logo"><a href="index.html">GLY Motor Group</a></div></h1>
    <button class="hamburger" aria-label="Toggle navigation">☰</button>
    <nav class="navbar">
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="cars.html">Cars</a></li>
        <li><a href="about.html">About Us</a></li>
        <li><a href="repair.html">Repair Services</a></li>
        <li><a href="feedback.html">Feedback</a></li>
        <li><a href="contact.html">Contact Us</a></li>
      </ul>
    </nav>
  </header>
  <section class="hero">
    <div class="banner-video">
      <video autoplay muted loop>
        <source src="Images/Videos/banner-video2.mp4" type="video/mp4">
      </video>
    </div>
    <h3>Welcome to GLY Motor Group</h3>
    <p>
      Preserving the Legends. Celebrating the Roar.
      A home for vintage muscle car enthusiasts and the machines that shaped an era.
    </p>
  </section>
  <footer class="foot">
    <p class="in-foot">&copy; 2026 GLY Motor Group. All rights reserved.</p>
  </footer>
  <script>
    const hamburger = document.querySelector('.hamburger');
    const navLinks = document.querySelectorAll('.navbar a');
    const navMenu = document.querySelector('.navbar ul');

    // Toggle menu on hamburger click
    hamburger.addEventListener('click', () => {
      navMenu.classList.toggle('show');
    });

    // Close menu when a navigation link is clicked
    navLinks.forEach(link => {
      link.addEventListener('click', () => {
        navMenu.classList.remove('show');
      });
    });
  </script>
</body>
</html>
